# ============================================================
# Server
# ============================================================
server.port=${PORT:8080}
spring.application.name=copilot-backend

# ============================================================
# Spring AI — OpenRouter (OpenAI-compatible Chat Completions)
# Using Chat Completions API: POST /v1/chat/completions
# Responses API is beta and lacks streaming/multimodal support.
# ============================================================
spring.ai.openai.api-key=${OPENROUTER_API_KEY}
spring.ai.openai.base-url=${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}

# Default text model for chat and decision
spring.ai.openai.chat.options.model=${OPENROUTER_TEXT_MODEL:openai/gpt-5.4-mini}

# Disable embeddings (OpenRouter does not expose an embeddings endpoint)
spring.ai.openai.embedding.enabled=false

# Vision model override — used in ImageAnalysisService per-request
openrouter.vision-model=${OPENROUTER_VISION_MODEL:openai/gpt-5.4-mini}

# ============================================================
# CORS — Angular dev server
# ============================================================
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200}

# ============================================================
# Actuator
# ============================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
